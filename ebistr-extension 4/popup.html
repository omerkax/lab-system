<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Alibey EBİSTR</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 300px; background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
  .hd { background: #1e293b; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #334155; }
  .hd-ti { font-weight: 700; font-size: 14px; }
  .hd-sub { font-size: 11px; color: #64748b; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; flex-shrink: 0; }
  .dot.ok { background: #22c55e; }
  .dot.err { background: #f87171; }
  .dot.warn { background: #fbbf24; }
  .sec { padding: 10px 14px; border-bottom: 1px solid #1e293b; }
  .sec-ti { font-size: 10px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .lbl { color: #64748b; font-size: 12px; flex-shrink: 0; width: 80px; }
  input, select { background: #1e293b; border: 1px solid #334155; border-radius: 5px; color: #f1f5f9; padding: 5px 8px; font-size: 12px; width: 100%; outline: none; }
  input:focus, select:focus { border-color: #3b82f6; }
  .btn { border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; padding: 8px 12px; transition: opacity .15s; width: 100%; margin-top: 6px; }
  .btn:hover { opacity: .85; }
  .btn-g { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .btn-grn { background: #22c55e; color: #fff; }
  .tok { font-family: monospace; font-size: 11px; color: #60a5fa; background: #1e293b; padding: 3px 8px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .msg { font-size: 11px; padding: 5px 8px; border-radius: 5px; margin-top: 6px; }
  .msg.ok { background: rgba(34,197,94,.1); color: #22c55e; }
  .msg.err { background: rgba(248,113,113,.1); color: #f87171; }
  .ft { padding: 10px 14px; display: flex; gap: 6px; }
</style>
</head>
<body>

<div class="hd">
  <div class="dot" id="dot"></div>
  <div>
    <div class="hd-ti">Alibey EBİSTR</div>
    <div class="hd-sub" id="statusTxt">Kontrol ediliyor...</div>
  </div>
</div>

<div class="sec">
  <div class="sec-ti">Token Durumu</div>
  <div class="row">
    <span class="lbl">Son Token</span>
    <span class="tok" id="tokTxt">—</span>
    <span style="font-size:10px;color:#64748b;flex-shrink:0" id="tokZaman"></span>
  </div>
</div>

<div class="sec">
  <div class="sec-ti">Proxy</div>
  <div class="row">
    <span class="lbl">URL</span>
    <input type="text" id="proxyUrl" placeholder="http://localhost:3737">
  </div>
  <button class="btn btn-g" id="btnProxyKaydet">💾 Kaydet</button>
  <button id="btnSyncToken" class="btn btn-g" style="width:100%; margin-top:5px; background:#f59e0b; color:#fff; border:none;">🔄 Girişi Senkronize Et</button>
  <button id="btnCopyToken" class="btn btn-g" style="width:100%; margin-top:5px; background:#334155; color:#e2e8f0; border:1px solid #475569;">📋 Token’ı panoya kopyala (mobil ayar için)</button>
</div>

<div class="sec">
  <div class="sec-ti">CSV Tarih Aralığı</div>
  <div class="row">
    <span class="lbl">Başlangıç</span>
    <input type="date" id="tarBas">
  </div>
  <div class="row">
    <span class="lbl">Bitiş</span>
    <input type="date" id="tarBit">
  </div>
  <div id="csvMsg"></div>
</div>

<div class="ft">
  <button class="btn btn-grn" id="btnCsvIndir" style="flex:2">⬇ CSV İndir</button>
  <button class="btn btn-g" id="btnKapat" style="flex:1">✕</button>
</div>

<script src="popup.js"></script>
</body>
</html>
